services:
  - type: web
    name: medibook-voice-clinic
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m app.seed
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_TIMEZONE
        value: Asia/Kolkata
      - key: DATABASE_URL
        generateValue: false
        value: sqlite:///./clinic.db
      - key: EMAIL_FROM
        sync: false          # set in Render dashboard
      - key: EMAIL_PASSWORD
        sync: false          # set in Render dashboard (Gmail App Password)
    disk:
      name: clinic-data
      mountPath: /opt/render/project/src
      sizeGB: 1